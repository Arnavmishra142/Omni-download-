<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSave | Universal Video Downloader</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-nav">
        <a href="#" id="navAbout">About</a>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">Omni<span>Save</span></div>
            <div class="subtitle">Download from Instagram, TikTok, YouTube, X & more.</div>
        </div>

        <div class="input-group">
            <div class="input-wrapper">
                <input type="url" id="videoUrl" placeholder="Paste your video link here..." autocomplete="off">
            </div>
            <button id="fetchBtn">
                <span id="btnText">Get Video</span>
                <div class="loader" id="loader"></div>
            </button>
        </div>

        <div id="statusMsg" class="msg"></div>

        <div class="result-card" id="resultCard">
            <img src="" alt="Video Thumbnail" class="video-thumbnail" id="thumbImg">
            <div class="platform-badge" id="platformBadge">Video Ready</div>
            <div class="video-title" id="vidTitle"></div>
            <a href="#" target="_blank" class="download-btn" id="dlLink">⬇ Download MP4</a>
        </div>

        <div class="developer-credit">Developed by <span>Arnav</span></div>
    </div>

    <div class="about-overlay" id="aboutOverlay">
        <div class="about-modal">
            <button class="close-about" id="closeAbout">&times;</button>
            <h2 class="about-title">Behind OmniSave</h2>
            <div class="about-content">
                <p>Hi, I'm <strong>Arnav</strong>, the developer behind this project.</p>
                <p>I built OmniSave to provide a fast, clean, and minimalist way to download videos.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
